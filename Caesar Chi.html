<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Caesar Chi — Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=JetBrains+Mono:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #F1EADB;
    --cream-2: #E9E0CC;
    --paper: #F8F3E7;
    --ink: #17130E;
    --ink-2: #2A231C;
    --ink-soft: #564A3C;
    --ink-mute: #8A7B68;
    --rule: #C9BBA0;
    --accent: #B8421C;
    --accent-deep: #8E2E10;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--ink);}
  body{
    font-family: 'Source Serif 4', 'Noto Serif TC', Georgia, serif;
    font-size:17px;
    line-height:1.65;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  body.zh{ font-family:'Noto Serif TC','Source Serif 4', Georgia, serif; }
  body.zh{ font-size:17px; line-height:1.8; }

  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:var(--paper)}

  /* ——— Paper texture ——— */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      radial-gradient(rgba(23,19,14,.035) 1px, transparent 1px),
      radial-gradient(rgba(23,19,14,.025) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    pointer-events:none;
    z-index:1;
    mix-blend-mode:multiply;
    opacity:.6;
  }

  /* ——— Top bar ——— */
  .topbar{
    position:fixed;
    top:0;left:0;right:0;
    z-index:50;
    padding:22px 40px;
    display:flex;align-items:center;justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    mix-blend-mode:multiply;
  }
  .topbar::before{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(to bottom, var(--cream) 40%, transparent);
    z-index:-1;
    pointer-events:none;
  }
  .mark{
    display:flex;align-items:center;gap:10px;
    color:var(--ink);
  }
  .mark-glyph{
    width:28px;height:28px;
    border:1.5px solid var(--ink);
    display:grid;place-items:center;
    font-family:'Playfair Display',serif;
    font-size:16px;
    font-style:italic;
    font-weight:600;
    letter-spacing:-.02em;
  }
  .topbar-right{display:flex;gap:28px;align-items:center}
  .lang-toggle{
    display:flex;
    border:1px solid var(--ink);
    padding:0;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.18em;
    background:transparent;
    cursor:pointer;
    overflow:hidden;
  }
  .lang-toggle span{
    padding:6px 12px;
    transition:all .2s ease;
  }
  .lang-toggle span.active{background:var(--ink);color:var(--cream)}
  .nav-dots{display:flex;gap:18px}
  .nav-dots a{
    position:relative;
    padding:6px 0;
    transition:color .2s;
  }
  .nav-dots a:hover{color:var(--ink)}

  /* ——— Section frame ——— */
  main{
    position:relative;
    z-index:2;
  }
  section{
    position:relative;
    padding:0 40px;
  }
  .page-edge{
    position:fixed;
    top:0;bottom:0;
    width:1px;
    background:var(--rule);
    opacity:.4;
    z-index:3;
    pointer-events:none;
  }
  .page-edge.left{left:40px}
  .page-edge.right{right:40px}

  /* ——— Hero ——— */
  .hero{
    min-height:100vh;
    padding-top:120px;
    padding-bottom:80px;
    display:grid;
    grid-template-columns: 1fr;
    position:relative;
  }
  .hero-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding-bottom:18px;
    border-bottom:1px solid var(--ink);
    margin-bottom:48px;
  }
  .issue{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .folio{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:15px;
    color:var(--ink-soft);
  }

  .hero-grid{
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:80px;
    align-items:end;
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:36px;
    display:flex;align-items:center;gap:14px;
  }
  .eyebrow::before{
    content:"";
    display:inline-block;
    width:36px;height:1px;
    background:var(--accent);
  }

  h1.display{
    font-family:'Playfair Display',serif;
    font-weight:500;
    font-size: clamp(64px, 9.5vw, 156px);
    line-height:.92;
    letter-spacing:-.025em;
    color:var(--ink);
    margin-bottom:40px;
  }
  h1.display .italic{
    font-style:italic;
    font-weight:400;
  }
  h1.display .ch{
    font-family:'Noto Serif TC', serif;
    font-weight:700;
    font-size:.72em;
    letter-spacing:.02em;
    display:inline-block;
    margin-left:.15em;
    color:var(--ink-2);
    vertical-align:.03em;
  }
  body.zh h1.display{
    font-family:'Noto Serif TC', serif;
    font-weight:700;
    font-size: clamp(68px, 10vw, 170px);
    letter-spacing:-.01em;
    line-height:1;
  }
  body.zh h1.display .en{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:400;
    font-size:.5em;
    letter-spacing:-.01em;
    color:var(--ink-soft);
    display:block;
    margin-top:.2em;
    line-height:1;
  }

  /* Rotating tagline */
  .tagline-wrap{
    border-top:1px solid var(--ink);
    border-bottom:1px solid var(--ink);
    padding:18px 0;
    margin-top:24px;
    display:flex;
    align-items:center;
    gap:18px;
    overflow:hidden;
  }
  .tagline-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .tagline-rotor{
    position:relative;
    flex:1;
    height:28px;
    overflow:hidden;
  }
  .tagline-rotor .item{
    position:absolute;
    inset:0;
    display:flex;align-items:center;
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:500;
    font-size:22px;
    letter-spacing:-.01em;
    color:var(--ink);
    opacity:0;
    transform: translateY(18px);
    transition: opacity .6s cubic-bezier(.2,.6,.2,1), transform .6s cubic-bezier(.2,.6,.2,1);
  }
  body.zh .tagline-rotor .item{
    font-family:'Noto Serif TC',serif;
    font-style:normal;
    font-weight:500;
    font-size:20px;
  }
  .tagline-rotor .item.active{opacity:1;transform:translateY(0)}
  .tagline-rotor .item.exit{opacity:0;transform:translateY(-18px)}

  /* Hero right column */
  .hero-right{
    padding-bottom:12px;
    position:relative;
  }
  .hero-lede{
    font-family:'Source Serif 4', Georgia, serif;
    font-weight:400;
    font-size:19px;
    line-height:1.55;
    color:var(--ink-2);
    max-width:420px;
    text-indent:0;
    margin-bottom:40px;
  }
  body.zh .hero-lede{
    font-family:'Noto Serif TC',serif;
    font-size:17px;
    line-height:1.85;
  }
  .hero-lede .drop{
    font-family:'Playfair Display',serif;
    font-weight:600;
    font-size:72px;
    line-height:.8;
    float:left;
    margin:8px 10px -4px 0;
    color:var(--accent);
  }
  body.zh .hero-lede .drop{
    font-family:'Noto Serif TC',serif;
    font-size:68px;
    line-height:.85;
    margin:10px 10px 0 0;
  }

  .hero-meta{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px 40px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding-top:24px;
    border-top:1px solid var(--rule);
  }
  .hero-meta dt{color:var(--ink-mute);margin-bottom:6px;font-size:9.5px;letter-spacing:.22em}
  .hero-meta dd{color:var(--ink);font-family:'Source Serif 4',serif;font-size:14px;letter-spacing:0;text-transform:none;font-style:italic}
  body.zh .hero-meta dd{font-family:'Noto Serif TC',serif;font-style:normal}

  /* Bottom hero strip */
  .hero-strip{
    position:absolute;
    bottom:32px;
    left:40px;right:40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .scroll-cue{
    display:flex;align-items:center;gap:10px;
  }
  .scroll-cue .line{
    width:40px;height:1px;background:var(--ink-soft);
    position:relative;overflow:hidden;
  }
  .scroll-cue .line::after{
    content:"";
    position:absolute;top:0;left:-40px;
    width:40px;height:1px;
    background:var(--ink);
    animation: scrollTrack 2.4s infinite;
  }
  @keyframes scrollTrack{
    0%{left:-40px}
    60%{left:100%}
    100%{left:100%}
  }

  /* ——— Editorial section ——— */
  .editorial{
    padding-top:160px;
    padding-bottom:160px;
    position:relative;
  }
  .section-head{
    display:grid;
    grid-template-columns: 180px 1fr;
    gap:40px;
    align-items:baseline;
    padding-bottom:28px;
    border-bottom:1px solid var(--ink);
    margin-bottom:64px;
  }
  .section-num{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .section-num b{color:var(--accent);font-weight:400}
  .section-title{
    font-family:'Playfair Display',serif;
    font-weight:500;
    font-size: clamp(36px, 5vw, 72px);
    line-height:1;
    letter-spacing:-.02em;
  }
  .section-title .italic{font-style:italic;font-weight:400}
  body.zh .section-title{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    letter-spacing:0;
  }

  /* ——— Pull quote ——— */
  .pullquote{
    max-width:1040px;
    margin:0 auto;
    padding:60px 0;
    border-top:1px solid var(--rule);
    border-bottom:1px solid var(--rule);
    text-align:center;
    position:relative;
  }
  .pullquote::before{
    content:"“";
    position:absolute;
    top:-12px;left:50%;
    transform:translateX(-50%);
    font-family:'Playfair Display',serif;
    font-size:80px;
    line-height:1;
    color:var(--accent);
    background:var(--cream);
    padding:0 14px;
  }
  .pullquote p{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:400;
    font-size: clamp(26px, 3.2vw, 40px);
    line-height:1.28;
    color:var(--ink);
    letter-spacing:-.01em;
  }
  body.zh .pullquote p{
    font-family:'Noto Serif TC',serif;
    font-style:normal;
    font-weight:400;
    line-height:1.6;
  }

  /* ——— Body copy ——— */
  .body-grid{
    display:grid;
    grid-template-columns: 180px 1fr;
    gap:40px;
    max-width:1200px;
    margin:0 auto;
  }
  .body-side{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    line-height:1.8;
  }
  .body-side .tick{
    display:block;
    margin-bottom:2px;
    color:var(--ink);
  }
  .body-col{
    max-width:680px;
  }
  .body-col p{
    margin-bottom:1.2em;
    font-size:18px;
    line-height:1.7;
    color:var(--ink-2);
  }
  body.zh .body-col p{
    font-size:17px;
    line-height:1.95;
  }
  .body-col p strong{
    font-weight:600;
    color:var(--ink);
  }
  .body-col p em{
    font-style:italic;
    color:var(--ink);
  }
  .body-col .lead{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:400;
    font-size: clamp(22px, 2.6vw, 30px);
    line-height:1.35;
    color:var(--ink);
    margin-bottom:1.6em;
    letter-spacing:-.005em;
  }
  body.zh .body-col .lead{
    font-family:'Noto Serif TC',serif;
    font-style:normal;
    font-weight:400;
    line-height:1.55;
  }

  /* First-letter drop cap on first para */
  .body-col p.dropcap::first-letter{
    font-family:'Playfair Display',serif;
    font-weight:700;
    font-size:78px;
    line-height:.72;
    float:left;
    margin:10px 12px -6px 0;
    color:var(--accent);
  }
  body.zh .body-col p.dropcap::first-letter{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:70px;
    line-height:.8;
    margin:14px 12px 0 0;
  }

  /* ——— Focus / portfolio ——— */
  .focus-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:0;
    border-top:1px solid var(--ink);
    border-left:1px solid var(--rule);
  }
  .focus-card{
    padding:48px 44px 56px;
    border-right:1px solid var(--rule);
    border-bottom:1px solid var(--rule);
    position:relative;
    background:var(--cream);
    transition: background .4s;
  }
  .focus-card:hover{background:var(--paper)}
  .focus-card .kicker{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
  }
  .focus-card h3{
    font-family:'Playfair Display',serif;
    font-weight:500;
    font-size:44px;
    line-height:1;
    letter-spacing:-.015em;
    margin-bottom:8px;
  }
  body.zh .focus-card h3{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
  }
  .focus-card .sub{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:18px;
    color:var(--ink-soft);
    margin-bottom:24px;
  }
  body.zh .focus-card .sub{
    font-family:'Noto Serif TC',serif;
    font-style:normal;
  }
  .focus-card p{
    font-size:16px;
    line-height:1.65;
    color:var(--ink-2);
    max-width:44ch;
  }
  body.zh .focus-card p{font-size:15.5px;line-height:1.9}

  .focus-mark{
    position:absolute;
    top:44px;right:44px;
    width:56px;height:56px;
    border:1px solid var(--ink);
    border-radius:50%;
    display:grid;place-items:center;
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:22px;
    color:var(--ink);
  }

  /* ——— Credits / ledger ——— */
  .ledger{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:0;
    border-top:1px solid var(--ink);
  }
  .ledger .cell{
    padding:36px 28px 44px;
    border-right:1px solid var(--rule);
    border-bottom:1px solid var(--rule);
  }
  .ledger .cell:last-child{border-right:none}
  .ledger .num{
    font-family:'Playfair Display',serif;
    font-weight:500;
    font-size:68px;
    line-height:1;
    letter-spacing:-.02em;
    color:var(--accent);
    margin-bottom:14px;
  }
  .ledger .num .unit{
    font-family:'Source Serif 4',serif;
    font-size:18px;
    font-style:italic;
    color:var(--ink-soft);
    margin-left:4px;
    font-weight:400;
    letter-spacing:0;
  }
  .ledger .label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .ledger .desc{
    font-size:14px;
    line-height:1.55;
    color:var(--ink-2);
  }
  body.zh .ledger .desc{font-size:13.5px;line-height:1.85}

  /* ——— Links / contact ——— */
  .contact{
    padding-top:140px;
    padding-bottom:120px;
    border-top:1px solid var(--ink);
    margin-top:120px;
  }
  .contact-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:80px;
    align-items:start;
  }
  .contact h2{
    font-family:'Playfair Display',serif;
    font-weight:500;
    font-size: clamp(48px, 6vw, 96px);
    line-height:.95;
    letter-spacing:-.02em;
  }
  .contact h2 .italic{font-style:italic;font-weight:400}
  body.zh .contact h2{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
  }

  .links{
    display:flex;flex-direction:column;
    gap:0;
    border-top:1px solid var(--ink);
  }
  .link-row{
    display:grid;
    grid-template-columns: 120px 1fr auto;
    gap:24px;
    padding:22px 0;
    border-bottom:1px solid var(--rule);
    align-items:baseline;
    transition: padding .3s;
    position:relative;
  }
  .link-row::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:0;
    background:var(--accent);
    transition:width .35s cubic-bezier(.2,.6,.2,1);
  }
  .link-row:hover{padding-left:18px}
  .link-row:hover::before{width:4px}
  .link-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .link-row .handle{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:22px;
    color:var(--ink);
  }
  .link-row .arrow{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    color:var(--ink-soft);
    transition: transform .3s;
  }
  .link-row:hover .arrow{transform:translateX(6px);color:var(--accent)}

  /* ——— Footer ——— */
  footer{
    padding:28px 40px 32px;
    border-top:1px solid var(--ink);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  footer .sig{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:14px;
    letter-spacing:0;
    text-transform:none;
    color:var(--ink);
  }

  /* ——— Scroll reveal ——— */
  .reveal{
    opacity:0;
    transform: translateY(24px);
    transition: opacity .9s cubic-bezier(.2,.6,.2,1), transform .9s cubic-bezier(.2,.6,.2,1);
  }
  .reveal.in{opacity:1;transform:none}
  .reveal-stagger > *{
    opacity:0;
    transform: translateY(18px);
    transition: opacity .7s cubic-bezier(.2,.6,.2,1), transform .7s cubic-bezier(.2,.6,.2,1);
  }
  .reveal-stagger.in > *{opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(1){transition-delay:.05s}
  .reveal-stagger.in > *:nth-child(2){transition-delay:.15s}
  .reveal-stagger.in > *:nth-child(3){transition-delay:.25s}
  .reveal-stagger.in > *:nth-child(4){transition-delay:.35s}
  .reveal-stagger.in > *:nth-child(5){transition-delay:.45s}
  .reveal-stagger.in > *:nth-child(6){transition-delay:.55s}

  /* Hero entrance */
  .hero-enter-1, .hero-enter-2, .hero-enter-3, .hero-enter-4{
    opacity:0;transform:translateY(20px);
    animation: heroIn 1.1s cubic-bezier(.2,.6,.2,1) forwards;
  }
  .hero-enter-1{animation-delay:.1s}
  .hero-enter-2{animation-delay:.3s}
  .hero-enter-3{animation-delay:.55s}
  .hero-enter-4{animation-delay:.8s}
  @keyframes heroIn{to{opacity:1;transform:none}}

  /* Animated underline for main name */
  .nameline{
    display:inline-block;
    position:relative;
  }
  .nameline::after{
    content:"";
    position:absolute;
    bottom:.08em;
    left:0;right:0;
    height:2px;
    background:var(--accent);
    transform-origin:left;
    transform:scaleX(0);

<script>
/* ——— Language toggle ——— */
const body = document.body;
const btn = document.getElementById('langToggle');
const spans = btn.querySelectorAll('span');

function setLang(lang){
  body.classList.toggle('zh', lang === 'zh');
  body.classList.toggle('en', lang === 'en');
  body.setAttribute('lang', lang === 'zh' ? 'zh-Hant' : 'en');

  spans.forEach(s => s.classList.toggle('active', s.dataset.lang === lang));

  // Text nodes
  document.querySelectorAll('[data-en]').forEach(el => {
    const val = lang === 'zh' ? el.dataset.zh : el.dataset.en;
    if (val != null) el.textContent = val;
  });
  // HTML nodes
  document.querySelectorAll('[data-en-html]').forEach(el => {
    const val = lang === 'zh' ? el.dataset.zhHtml : el.dataset.enHtml;
    if (val != null) el.innerHTML = val;
  });

  // Hero display switch (structural)
  document.querySelectorAll('.en-only').forEach(n => n.style.display = lang === 'zh' ? 'none' : '');
  document.querySelectorAll('.zh-only').forEach(n => n.style.display = lang === 'zh' ? '' : 'none');

  // Rotor
  rebuildRotor(lang);

  // persist
  try{ localStorage.setItem('cc-lang', lang); }catch(e){}
}

btn.addEventListener('click', () => {
  const cur = body.classList.contains('zh') ? 'zh' : 'en';
  setLang(cur === 'zh' ? 'en' : 'zh');
});
spans.forEach(s => s.addEventListener('click', e => {
  e.stopPropagation();
  setLang(s.dataset.lang);
}));

/* ——— Tagline rotor ——— */
const TAGLINES = {
  en: [
    "Building the infrastructure for personalized brand retail.",
    "Fifteen years inside the Node.js &amp; JavaScript ecosystem.",
    "Stitching AI, supply chain, and the factory floor.",
    "Operator at Cymmetrik. Organizer at Node.js Taiwan."
  ],
  zh: [
    "打造個人化品牌零售的基礎建設。",
    "在 Node.js 與 JavaScript 生態裡的第十五年。",
    "把 AI、供應鏈、與工廠現場縫成一張網。",
    "正美企業經營者，Node.js Taiwan Organizer。"
  ]
};

let rotorIdx = 0;
let rotorLang = 'en';
let rotorTimer = null;

function rebuildRotor(lang){
  rotorLang = lang;
  const rotor = document.getElementById('rotor');
  rotor.innerHTML = '';
  TAGLINES[lang].forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'item' + (i === 0 ? ' active' : '');
    d.innerHTML = t;
    rotor.appendChild(d);
  });
  rotorIdx = 0;
}

function advanceRotor(){
  const rotor = document.getElementById('rotor');
  const items = rotor.querySelectorAll('.item');
  if(!items.length) return;
  const cur = items[rotorIdx];
  const nextIdx = (rotorIdx + 1) % items.length;
  const next = items[nextIdx];
  cur.classList.remove('active');
  cur.classList.add('exit');
  next.classList.remove('exit');
  // tiny beat before activating next
  requestAnimationFrame(() => {
    next.classList.add('active');
  });
  setTimeout(() => cur.classList.remove('exit'), 700);
  rotorIdx = nextIdx;
}

/* ——— Scroll reveal ——— */
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if(e.isIntersecting){
      e.target.classList.add('in');
      io.unobserve(e.target);
    }
  });
}, {threshold: 0.15, rootMargin: '0px 0px -60px 0px'});

document.querySelectorAll('.reveal, .reveal-stagger').forEach(el => io.observe(el));

/* ——— Scrolled state ——— */
window.addEventListener('scroll', () => {
  document.body.classList.toggle('scrolled', window.scrollY > 80);
}, {passive:true});

/* ——— Init ——— */
(function init(){
  let saved = 'en';
  try{ saved = localStorage.getItem('cc-lang') || 'en'; }catch(e){}
  setLang(saved);
  // kick rotor
  clearInterval(rotorTimer);
  rotorTimer = setInterval(advanceRotor, 3600);
})();
</script>
